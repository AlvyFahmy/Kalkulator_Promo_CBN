<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#0B3D5C;--s:#1A8FBA;--a:#F5A623;--bg:#F0F4F8;--card:#FFFFFF;--txt:#1A2A3F;--g:#6B7B8D;--green:#16A34A;--red:#DC2626;--border:#E2E8F0;--purple:#7C3AED}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* Login UI Styles */
#login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%); padding: 20px; }
.login-box { background: white; padding: 32px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
.login-box h2 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 20px; color: var(--p); }
.login-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; }
.login-btn { width: 100%; padding: 12px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
.login-btn:hover { background: var(--p); }
#error-msg { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

/* App UI (Hidden by default) */
#main-app { display: none; }
.header{background:linear-gradient(135deg,#0B3D5C 0%,#1A8FBA 100%);padding:20px 28px;box-shadow:0 4px 20px rgba(11,61,92,.25); display: flex; justify-content: space-between; align-items: center;}
.header-text h1{font-family:'Space Grotesk',sans-serif;color:#fff;font-size:22px;font-weight:700;letter-spacing:-.5px}
.header-text p{color:rgba(255,255,255,.75);font-size:12px;margin-top:4px}
.logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }

/* Original Styles */
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
.grid-top{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:768px){.grid-top{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border)}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--p);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
label{display:block;font-size:11px;font-weight:500;color:var(--g);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
select,input[type=number], input[type=text], input[type=password]{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--txt);background:#fff;transition:border .2s;-moz-appearance:textfield}
select:focus,input:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 3px rgba(26,143,186,.12)}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=date]{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--txt);background:#fff;transition:border .2s}
.field{margin-bottom:12px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toggle-row{display:flex;gap:6px;margin-bottom:12px}
.toggle-btn{flex:1;padding:7px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--g);text-align:center;transition:all .2s}
.toggle-btn.active{background:var(--s);color:#fff;border-color:var(--s)}
.section-label{font-size:11px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding-top:10px;border-top:1px solid var(--border)}
.pkg-summary{background:#f0f8ff;border-radius:10px;padding:12px;font-size:13px;margin-bottom:14px}
.pkg-summary .name{font-weight:700;margin-bottom:4px}
.result-banner{border-radius:14px;padding:20px 24px;margin-bottom:20px;text-align:center;display:none}
.result-banner.show{display:block}
.result-banner.saving{background:linear-gradient(135deg,#16A34A,#22C55E);color:#fff}
.result-banner.more{background:linear-gradient(135deg,#F59E0B,#F97316);color:#fff}
.result-banner .amount{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700}
.result-banner .sub{font-size:12px;opacity:.85;margin-top:2px}
.benefit-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:768px){.benefit-grid{grid-template-columns:1fr}}
.benefit-card{border-radius:12px;padding:16px;text-align:center;border:1.5px solid}
.benefit-card .icon{font-size:28px;margin-bottom:6px}
.benefit-card .blabel{font-size:11px;color:var(--g);text-transform:uppercase;letter-spacing:.5px}
.benefit-card .value{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-top:2px}
.benefit-card.disc{border-color:#a7f3d0;background:#f0fdf4}.benefit-card.disc .value{color:var(--green)}
.benefit-card.speed{border-color:#c4b5fd;background:#f5f3ff}.benefit-card.speed .value{color:var(--purple)}
.benefit-card.save{border-color:#fbbf24;background:#fffbeb}.benefit-card.save .value{color:#92400e}
.compare-section{display:grid;grid-template-columns:1fr 48px 1fr;gap:12px;align-items:start;margin-bottom:20px}
@media(max-width:768px){.compare-section{grid-template-columns:1fr}}
.compare-card{border-radius:14px;padding:20px;border:2px solid}
.compare-card.before{border-color:var(--red);background:rgba(220,38,38,.03)}
.compare-card.after{border-color:var(--green);background:rgba(22,163,74,.03)}
.compare-card h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin-bottom:12px}
.stat-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border:none}
.stat-row.total-row{background:#f8fafc;margin:8px -20px -20px;padding:12px 20px;border-radius:0 0 12px 12px;border:none}
.stat-label{color:var(--g)}.stat-val{font-weight:600}
.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}
.vs-circle{width:48px;height:48px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;margin:40px auto 0;box-shadow:0 4px 12px rgba(11,61,92,.3)}
.adv-section{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1.5px solid #c4b5fd;border-radius:14px;padding:20px;margin-bottom:20px}
.adv-section h3{font-family:'Space Grotesk',sans-serif;color:var(--purple);font-size:15px;margin-bottom:12px}
.adv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.adv-card{background:#fff;border-radius:10px;padding:14px;text-align:center;border:1px solid #e9d5ff}
.adv-card.hl{border:2px solid var(--purple)}
.adv-card .scheme{font-size:12px;font-weight:700;color:var(--purple)}
.adv-card .total{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--p);margin:4px 0}
.adv-card .eff{font-size:11px;color:var(--g)}
.adv-card .free{display:inline-block;background:var(--purple);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:4px}
.script-card{border-radius:14px;padding:20px 24px;border-left:4px solid var(--a);background:rgba(245,166,35,.06);margin-bottom:16px}
.script-card h3{font-family:'Space Grotesk',sans-serif;font-size:15px;color:#92400E;margin-bottom:10px}
.script-card p{font-size:13px;line-height:1.7}
.hl{background:rgba(245,166,35,.2);padding:1px 4px;border-radius:3px;font-weight:600}
.empty{text-align:center;padding:60px 20px;color:var(--g)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty h3{font-family:'Space Grotesk',sans-serif;font-size:18px;color:var(--p);margin-bottom:6px}
</style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h2>CBN Calculator Login</h2>
        <input type="text" id="username-in" class="login-input" placeholder="Username">

<div id="main-app">

<script>
// DATABASE USER
const USERS = [
    { name: "Abdiel Wahyu Ramadhyono", user: "abdiel.wyhu", pass: "cvm_123" },

    { name: "Lidia Nababan", user: "lidia.nababan", pass: "ret_123" },

    { name: "Litska Yul Saros Simbolon", user: "litska.yul", pass: "ret_123" },

    { name: "Retno Wulan Dari", user: "retno.wulan", pass: "ret_123" },
    { name: "Rio Romadhon", user: "rio.romadhon", pass: "ret_123" },
    { name: "Rynna Tarryna Sihite", user: "rynna.tarryna", pass: "ret_123" },
    { name: "Shalula Izzata Raikhany", user: "shalula.izzata", pass: "ret_123" },
    { name: "Surapina Handayani", user: "surapina.handayani", pass: "ret_123" },

// LOGIN LOGIC
function handleLogin() {
    const uIn = document.getElementById('username-in').value;
    const pIn = document.getElementById('password-in').value;
    const err = document.getElementById('error-msg');
    
    const found = USERS.find(u => u.user === uIn && u.pass === pIn);
    
    if (found) {
        localStorage.setItem('cbn_auth', JSON.stringify(found));
        initApp();
    } else {
        err.style.display = 'block';
    }
}

function handleLogout() {
    localStorage.removeItem('cbn_auth');
    location.reload();
}

function initApp() {
    const auth = localStorage.getItem('cbn_auth');
    if (auth) {
        const user = JSON.parse(auth);
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('welcome-text').innerText = `Halo, ${user.name}`;
        render(); // Run original app render
    }
}

// Check session on load
window.onload = initApp;

// --- ORIGINAL APP LOGIC START ---
const P=[
{n:"Fiber 20",sp:20,pr:169000,d3:.2,d6:.2,d12:.2,sb:20,sbl:"+20 Mbps",a3:507000,a6:1014000,a12:2028000},
{n:"Fiber 30",sp:30,pr:199000,d3:.2,d6:.2,d12:.2,sb:30,sbl:"+30 Mbps",a3:597000,a6:1194000,a12:2388000},
{n:"Fiber 50",sp:50,pr:229000,d3:.3,d6:.3,d12:.3,sb:50,sbl:"+50 Mbps",a3:687000,a6:1374000,a12:2748000},
{n:"Fiber 75",sp:75,pr:329000,d3:.3,d6:.3,d12:.3,sb:50,sbl:"+50 Mbps",a3:987000,a6:1974000,a12:3948000},
{n:"Fiber 75 New",sp:75,pr:339000,d3:.3,d6:.3,d12:.3,sb:50,sbl:"+50 Mbps",a3:1017000,a6:2034000,a12:4068000},
{n:"Fiber 100",sp:100,pr:429000,d3:.35,d6:.35,d12:.35,sb:100,sbl:"+100 Mbps",a3:1287000,a6:2574000,a12:5148000},
{n:"Fiber 100 (Sum-Bal)",sp:100,pr:529000,d3:.35,d6:.35,d12:.35,sb:100,sbl:"+100 Mbps",a3:1587000,a6:3174000,a12:6348000},
{n:"Fiber 150",sp:150,pr:429000,d3:.35,d6:.35,d12:.35,sb:100,sbl:"+100 Mbps",a3:1287000,a6:2574000,a12:5148000},
{n:"Fiber 150 New",sp:150,pr:559000,d3:.35,d6:.35,d12:.35,sb:100,sbl:"+100 Mbps",a3:1677000,a6:3354000,a12:6708000},
{n:"Fiber 150 New (Sum-Bal)",sp:150,pr:659000,d3:.35,d6:.35,d12:.35,sb:100,sbl:"+100 Mbps",a3:1977000,a6:3954000,a12:7908000},
{n:"Fiber Pro 100",sp:100,pr:599000,d3:.4,d6:.4,d12:.4,sb:100,sbl:"+100 Mbps",a3:1797000,a6:3594000,a12:7188000},
{n:"Fiber 250",sp:250,pr:799000,d3:.4,d6:.4,d12:.4,sb:250,sbl:"+250 Mbps",a3:2397000,a6:4794000,a12:9588000},
{n:"Fiber Pro 200",sp:200,pr:999000,d3:.4,d6:.4,d12:.4,sb:200,sbl:"+200 Mbps",a3:2997000,a6:5994000,a12:11988000},
{n:"Fiber 250 (Sum-Bal)",sp:250,pr:1099000,d3:.4,d6:.4,d12:.4,sb:250,sbl:"+250 Mbps",a3:3297000,a6:6594000,a12:13188000},
{n:"Fiber 500",sp:500,pr:1399000,d3:.4,d6:.4,d12:.4,sb:250,sbl:"+250 Mbps",a3:4197000,a6:8394000,a12:16788000},
{n:"Fiber 1000",sp:1000,pr:3999000,d3:.4,d6:.4,d12:.4,sb:0,sbl:"—",a3:11997000,a6:23994000,a12:47988000},
];
let S={pkg:"",mName:"",mSpeed:0,mPrice:0,startDate:"",pt:"disc",per:"6",stbN:0,stbP:0,dCC:0,dBIF:0,bif:0,bBIF:0,adm:5000,ppnM:"11",ppnC:11,cDisc:0};
const fmt=n=>"Rp "+Math.round(n).toLocaleString("id-ID");
const fmtDate=d=>{if(!d)return'-';const m=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear()};
function calcEndDate(startStr,months){if(!startStr)return null;const d=new Date(startStr);d.setMonth(d.getMonth()+months);d.setDate(d.getDate()-1);return d}
const pct=n=>Math.round(n*1000)/10+"%";
function ppn(){return S.ppnM==="11"?.11:S.ppnM==="12"?.12:(S.ppnC||0)/100}
function u(k,v){S[k]=v;render()}
function calc(){
  let p=P.find(x=>x.n===S.pkg);
  if(S.pkg==='__manual__'){
    if(!S.mSpeed||!S.mPrice)return null;
    p={n:S.mName||('Paket '+S.mSpeed+' Mbps'),sp:S.mSpeed,pr:S.mPrice,d3:.2,d6:.2,d12:.2,sb:0,sbl:'—',a3:S.mPrice*3,a6:S.mPrice*6,a12:S.mPrice*12};
  }
  if(!p)return null;
  const tax=ppn(),stb=S.stbN*S.stbP;
  const dc=S.cDisc>0?S.cDisc:(S.per==="3"?p.d3:S.per==="6"?p.d6:p.d12);
  const dA=Math.round(p.pr*dc),aD=p.pr-dA,aS=aD+stb;
  const ccA=Math.round(aS*S.dCC),aCC=aS-ccA;
  const bfDA=Math.round(p.pr*S.dBIF),aBFD=aCC-bfDA;
  const bfA=Math.round(p.pr*S.bif);
  const aBF=aBFD+bfA+S.bBIF;
  const ppnP=Math.round((aBF+S.adm)*tax),nP=aBF+S.adm+ppnP;
  const nB=p.pr+stb+bfA+S.bBIF,nPPN=Math.round((nB+S.adm)*tax),nN=nB+S.adm+nPPN;
  const advPer=+S.per,advBase=S.per==='3'?p.a3:S.per==='6'?p.a6:p.a12;
  const advMonths=S.per==='3'?4:S.per==='6'?9:18;
  const advFree=advMonths-advPer;
  const advSTBTotal=stb*advMonths;
  const advBIFTotal=(bfA+S.bBIF)*advMonths;
  const advAdminTotal=S.adm;
  const advSubtotal=advBase+advSTBTotal+advBIFTotal+advAdminTotal;
  const advPPNTotal=Math.round(advSubtotal*tax);
  const advTotal=advSubtotal+advPPNTotal;
  const advEff=Math.round(advTotal/advMonths);
  const advNormalTotal=nN*advMonths;
  const advSaving=advNormalTotal-advTotal;
  const advSavingMonthly=Math.round(advSaving/advMonths);
  const isAdv=S.pt==='adv';
  const finalSaving=isAdv?advSavingMonthly:(nN-nP);
  return{p,dc,dA,aD,stb,aS,ccA,aCC,bfDA,aBFD,bfA,aBF,ppnP,nP,nB,nPPN,nN,ts:p.sp+p.sb,per:+S.per,tax,isAdv,advBase,advTotal,advMonths,advFree,advEff,advSTBTotal,advBIFTotal,advAdminTotal,advPPNTotal,advNormalTotal,advSaving,advSavingMonthly,finalSaving,startD:S.startDate?new Date(S.startDate):null,endD:calcEndDate(S.startDate,isAdv?advMonths:+S.per),endDiscD:calcEndDate(S.startDate,+S.per),promoMonths:isAdv?advMonths:+S.per};
}
function render(){
  const r=calc(),p=r?r.p:P.find(x=>x.n===S.pkg);
  document.getElementById("app").innerHTML=`
  <div class="grid-top">
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--s)"></span>Paket Pelanggan & Biaya</div>
      <div class="field"><label>Pilih Paket CBN</label>
        <select onchange="u('pkg',this.value)"><option value="">-- Pilih paket --</option>
        <optgroup label="Fiber Home">${P.filter(x=>!x.n.includes('Pro')).map(x=>`<option value="${x.n}" ${S.pkg===x.n?'selected':''}>${x.n} — ${x.sp} Mbps — ${fmt(x.pr)}/bln</option>`).join("")}</optgroup>
        <optgroup label="Fiber Pro">${P.filter(x=>x.n.includes('Pro')).map(x=>`<option value="${x.n}" ${S.pkg===x.n?'selected':''}>${x.n} — ${x.sp} Mbps — ${fmt(x.pr)}/bln</option>`).join("")}</optgroup>
        <optgroup label="────────">
          <option value="__manual__" ${S.pkg==='__manual__'?'selected':''}>✏️ Input Manual (Paket Lama / Custom)</option>
        </optgroup>
        </select></div>
      ${S.pkg==='__manual__'?`
      <div style="background:#FFFBEB;border-radius:10px;padding:12px;margin-bottom:14px;border:1.5px dashed #F5A623">
        <div style="font-size:12px;font-weight:600;color:#92400E;margin-bottom:8px">✏️ Input Manual — Paket Lama / Tidak Ada di List</div>
        <div class="field"><label>Nama Paket</label><input type="text" value="${S.mName}" onchange="u('mName',this.value)" placeholder="misal: Fiber 40, Combo 60"></div>
        <div class="row-2">
          <div class="field"><label>Speed (Mbps)</label><input type="number" min="0" value="${S.mSpeed||''}" onchange="u('mSpeed',+this.value)" placeholder="misal: 40"></div>
          <div class="field"><label>Harga/bln (sebelum PPN)</label><input type="number" min="0" value="${S.mPrice||''}" onchange="u('mPrice',+this.value)" placeholder="misal: 299000"></div>
        </div>
      </div>`:''}
      ${p?`<div class="pkg-summary" style="${S.pkg==='__manual__'?'background:#FFFBEB':''}"><div class="name">${p.n} — ${p.sp} Mbps ${S.pkg==='__manual__'?'<span style=font-size:11px;color:#92400E>(manual)</span>':''}</div>Harga: <strong>${fmt(p.pr)}</strong>/bln | SpeedBoost: <strong>${p.sbl}</strong> → Total <strong>${p.sp+p.sb} Mbps</strong></div>`:''}
      <div class="section-label">STB (Set Top Box)</div>
      <div class="row-2">
        <div class="field"><label>Jumlah STB</label><input type="number" min="0" value="${S.stbN}" onchange="u('stbN',+this.value)"></div>
        <div class="field"><label>Harga Sewa STB / unit (Rp)</label><input type="number" min="0" value="${S.stbP||''}" onchange="u('stbP',+this.value)" placeholder="misal: 45000"></div>
      </div>
      <div class="section-label">Biaya Tambahan</div>
      <div class="row-2">
        <div class="field"><label>Biaya Admin (Rp)</label><input type="number" min="0" value="${S.adm}" onchange="u('adm',+this.value)"></div>
        <div class="field"><label>Biaya BIF (Rp)</label><input type="number" min="0" value="${S.bBIF||''}" onchange="u('bBIF',+this.value)" placeholder="0"></div>
      </div>
      <div class="field"><label>BIF (desimal, misal 0.02 = 2%)</label><input type="number" step="0.01" min="0" max="1" value="${S.bif||''}" onchange="u('bif',+this.value)"></div>
      <div class="section-label">PPN</div>
      <div class="toggle-row">
        <div class="toggle-btn ${S.ppnM==='11'?'active':''}" onclick="u('ppnM','11')">11%</div>
        <div class="toggle-btn ${S.ppnM==='12'?'active':''}" onclick="u('ppnM','12')">12%</div>
        <div class="toggle-btn ${S.ppnM==='custom'?'active':''}" onclick="u('ppnM','custom')">Manual</div>
      </div>
      ${S.ppnM==='custom'?`<div class="field"><label>PPN Manual (%)</label><input type="number" step="0.1" min="0" value="${S.ppnC}" onchange="u('ppnC',+this.value)"></div>`:''}
    </div>
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--green)"></span>Konfigurasi Promo</div>
      <div class="field"><label>Tipe Promo</label>
        <div class="toggle-row">
          <div class="toggle-btn ${S.pt==='disc'?'active':''}" onclick="u('pt','disc')">Diskon Bulanan</div>
          <div class="toggle-btn ${S.pt==='adv'?'active':''}" onclick="u('pt','adv')">Advance Payment</div>
        </div></div>
      <div class="field"><label>Periode</label>
        <div class="toggle-row">
          <div class="toggle-btn ${S.per==='3'?'active':''}" onclick="u('per','3')">3 Bulan</div>
          <div class="toggle-btn ${S.per==='6'?'active':''}" onclick="u('per','6')">6 Bulan</div>
          <div class="toggle-btn ${S.per==='12'?'active':''}" onclick="u('per','12')">12 Bulan</div>
        </div></div>
      <div class="field"><label>Promo Efektif Mulai</label><input type="date" value="${S.startDate}" onchange="u('startDate',this.value)"></div>
      <div class="field"><label>Override Diskon</label><input type="number" step="0.01" min="0" max="1" value="${S.cDisc||''}" onchange="u('cDisc',+this.value)"></div>
      <div class="section-label">Diskon Tambahan</div>
      <div class="row-2">
        <div class="field"><label>Discount CC / ADV</label><input type="number" step="0.01" min="0" max="1" value="${S.dCC||''}" onchange="u('dCC',+this.value)"></div>
        <div class="field"><label>Discount BIF</label><input type="number" step="0.01" min="0" max="1" value="${S.dBIF||''}" onchange="u('dBIF',+this.value)"></div>
      </div>
    </div>
  </div>
  ${r?renderR(r):`<div class="empty"><div class="icon">🧮</div><h3>Pilih Paket CBN</h3></div>`}`;
}
function renderR(r){
  const p=r.p;
  return`
  <div class="result-banner ${r.finalSaving>0?'saving':'more'} show">
    <div class="sub">${r.isAdv?'💰 Total Penghematan Advance':'💰 Pelanggan HEMAT per bulan'}</div>
    <div class="amount">${fmt(r.isAdv?r.advSaving:Math.abs(r.finalSaving))}</div>
    <div class="sub">Normal ${fmt(r.nN)} → Promo ${fmt(r.isAdv?r.advEff:r.nP)}</div>
  </div>
  <div class="benefit-grid">
    <div class="benefit-card disc"><div class="icon">🏷️</div><div class="blabel">Promo</div><div class="value">${r.isAdv?'Pay '+r.per+' Get '+r.advMonths:pct(r.dc)}</div></div>
    <div class="benefit-card speed"><div class="icon">⚡</div><div class="blabel">Total Speed</div><div class="value">${r.ts} Mbps</div></div>
    <div class="benefit-card save"><div class="icon">💰</div><div class="blabel">Total Benefit</div><div class="value">${fmt(r.isAdv?r.advSaving:r.finalSaving*r.per)}</div></div>
  </div>
  <div class="compare-section">
    <div class="compare-card before">
      <h3 style="color:var(--red)">❌ Tanpa Promo</h3>
      <div class="stat-row"><span class="stat-label">Total / Bulan</span><span class="stat-val red">${fmt(r.nN)}</span></div>
    </div>
    <div><div class="vs-circle">VS</div></div>
    <div class="compare-card after">
      <h3 style="color:var(--green)">✅ Dengan Promo</h3>
      <div class="stat-row"><span class="stat-label">Efektif / Bulan</span><span class="stat-val green">${fmt(r.isAdv?r.advEff:r.nP)}</span></div>
    </div>
  </div>
  <div class="script-card">
    <h3>📋 Script untuk Pelanggan</h3>
    <p>"Pak/Bu, dengan program loyalty kami, tagihan menjadi <span class="hl">${fmt(r.isAdv?r.advEff:r.nP)}/bulan</span> dan speed naik jadi <span class="hl">${r.ts} Mbps</span>. Hemat <span class="hl">${fmt(r.isAdv?r.advSaving:r.finalSaving*r.per)}</span> selama masa promo. Tertarik?"</p>
  </div>`;
}
// --- ORIGINAL APP LOGIC END ---

</script>
</body>
</html>
